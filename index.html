<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cypress Big Tex Trailers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Barlow', 'sans-serif'],
              display: ['"Barlow Condensed"', 'sans-serif'],
            },
            colors: {
              brand: {
                red: '#CC0000', // Big Tex Red
                dark: '#111111',
                gray: '#333333',
                light: '#F4F4F4',
                accent: '#FFD700' // Gold for CTAs
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      
      /* Typography Overrides for Branding */
      .font-display {
        font-style: italic !important;
        text-shadow: -3px 3px 0px rgba(0, 0, 0, 0.1);
      }
      .bg-brand-dark .font-display,
      .bg-gray-900 .font-display,
      .text-white .font-display,
      .font-display.text-white {
        text-shadow: -3px 3px 0px rgba(255, 255, 255, 0.15);
      }
      
      /* WordPress HTML Injection Overrides */
      .prose-dark .row, .prose-light .row { display: flex; flex-wrap: wrap; margin: 0 -15px; }
      .prose-dark .col-12, .prose-light .col-12 { flex: 0 0 100%; max-width: 100%; padding: 0 15px; }
      @media (min-width: 768px) { 
        .prose-dark .col-md-6, .prose-light .col-md-6 { flex: 0 0 50%; max-width: 50%; } 
      }
      .prose-dark table { width: 100%; margin-bottom: 2rem; border-collapse: collapse; color: #fff; background: #1a1a1a; border-radius: 4px; overflow: hidden; }
      .prose-dark table th, .prose-dark table td { padding: 1rem; text-align: left; border-bottom: 1px solid #333; }
      .prose-dark table thead th { border-bottom: 2px solid #CC0000; text-transform: uppercase; letter-spacing: 0.05em; color: #888; font-size: 0.85rem; }
      .prose-dark img { max-width: 100%; height: auto; border-radius: 4px; border: 1px solid #333; }
      .prose-dark h2 { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; margin-bottom: 1rem; color: #fff; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
      .prose-dark p { color: #aaa; line-height: 1.6; margin-bottom: 1rem; }
      .prose-dark .larger { font-size: 1.125rem; font-weight: 600; color: #fff; margin-bottom: 1rem; display: block; }
      
      .prose-light img { max-width: 100%; height: auto; border-radius: 4px; margin: 1rem 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      .prose-light p { margin-bottom: 1rem; color: #4b5563; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 text-brand-dark antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
